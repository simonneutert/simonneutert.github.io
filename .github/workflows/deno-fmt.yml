name: "deno fmt"

on:
  # Run on manual trigger
  workflow_dispatch:

# Grant permissions for creating pull requests
permissions:
  contents: write
  pull-requests: write

# Prevent multiple runs from updating the same PR simultaneously
concurrency:
  group: fmt-blog-content
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog repository
        uses: actions/checkout@v6
        # This checks out YOUR blog repository where this workflow file lives
        # If this workflow is in a different repo than your blog, specify:
        # with:
        #   repository: your-username/your-blog-repo

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: deno fmt
        run: deno fmt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: format code with deno fmt"
          branch: deno-fmt-update
          delete-branch: true
          title: "chore: format code with deno fmt"
          body: |
            ## Automated Update

            This PR formats the code using Deno's built-in formatter.

            - Generated by: deno fmt
            - Triggered by: ${{ github.event_name }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ---
            *This is an automated PR. Review and merge if the changes look correct.*
          labels: |
            automated
            deno-fmt
          assignees: ${{ github.repository_owner }}
